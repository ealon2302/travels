<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f6f8fa" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="יעדי הטיול">
<meta name="description" content="ניהול יעדי טיול אישיים לפי מדינות, אזורים ושנים">
<title>יעדי הטיול שלי 🌍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  :root {
    --been: #3fb950;
    --planned: #388bfd;
    --accent: #f78166;
    --priority1: #ffd700;
    --priority2: #c0c0c0;
    --priority3: #cd7f32;
    --trip: #7c3aed;
    --cruise: #0891b2;
    --vacation: #db2777;
  }

  /* DARK theme (default) */
  body.theme-dark {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --neither: #484f58;
    --map-bg: #0d1520;
    --map-country-dim: #1a1f2e;
    --map-stroke: rgba(255,255,255,0.12);
  }

  /* LIGHT theme */
  body.theme-light {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface2: #eaeef2;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #636c76;
    --neither: #b0b8c4;
    --map-bg: #dce8f5;
    --map-country-dim: #e8edf2;
    --map-stroke: rgba(0,0,0,0.15);
  }

  body.theme-light header {
    background: linear-gradient(135deg, #e8eef5 0%, #f6f8fa 100%);
  }
  body.theme-light .controls { background: #ffffff; }
  body.theme-light select {
    background: #ffffff;
    color: #1f2328;
  }
  body.theme-light .search-wrap input { background: #f6f8fa; color: #1f2328; }
  body.theme-light .continent-header { background: #ffffff; }
  body.theme-light .continent-header:hover { background: #f0f3f6; }
  body.theme-light .destinations-list { background: #f6f8fa; }
  body.theme-light .dest-item:hover { background: #eaeef2; }
  body.theme-light .continent-breakdown { background: #ffffff; }
  body.theme-light .stat-card { background: #ffffff; }
  body.theme-light .cb-bar-wrap { background: #e0e6ec; }
  body.theme-light .scroll-top { background: var(--planned); }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
    /* padding-bottom handled by iOS safe-area CSS below */
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-dot.been { background: var(--been); }
  .stat-dot.planned { background: var(--planned); }
  .stat-dot.neither { background: var(--neither); }
  .stat strong { color: var(--text); }

  /* CONTROLS */
  .controls {
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--planned); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
  }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .pill {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--text); color: var(--text); }
  .pill.active { background: var(--planned); border-color: var(--planned); color: white; }
  .pill.active.been-pill { background: var(--been); border-color: var(--been); }
  .pill.active.accent-pill { background: var(--accent); border-color: var(--accent); }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
  }
  .modal-body select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    flex: 1;
    -webkit-appearance: auto;
    appearance: auto;
  }
  .modal-body select option {
    background: var(--surface);
    color: var(--text);
  }

  /* VIEW TOGGLE */
  .view-toggle {
    display: flex;
    gap: 4px;
    margin-right: auto;
  }
  .view-btn {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--surface2); color: var(--text); border-color: var(--text); }

  /* RESULTS INFO */
  .results-info {
    padding: 8px 20px;
    font-size: 0.78rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  /* CONTINENT SECTION */
  .continent-section { margin-bottom: 2px; }

  .continent-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .continent-header:hover { background: var(--surface2); }

  .continent-flag { font-size: 1.3rem; }
  .continent-name { font-weight: 700; font-size: 0.95rem; flex: 1; }
  .continent-counts { display: flex; gap: 8px; }
  .cnt-badge {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .cnt-badge.been { background: rgba(63,185,80,0.15); color: var(--been); }
  .cnt-badge.planned { background: rgba(56,139,253,0.15); color: var(--planned); }
  .cnt-badge.total { background: rgba(255,255,255,0.06); color: var(--muted); }
  .collapse-icon { color: var(--muted); font-size: 0.8rem; transition: transform 0.2s; }
  .collapsed .collapse-icon { transform: rotate(-90deg); }

  /* DESTINATIONS LIST */
  .destinations-list {
    background: var(--bg);
  }
  .destinations-list.collapsed { display: none; }

  /* DESTINATION ITEM */
  .dest-item {
    display: flex;
    align-items: center;
    padding: 10px 20px 10px 16px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .dest-item:hover { background: var(--surface); }

  .dest-item.is-country {
    padding-right: 20px;
  }
  .dest-item:not(.is-country) {
    padding-right: 40px;
  }
  .dest-item:not(.is-country)::before {
    content: '';
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  .status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-indicator.been { background: var(--been); box-shadow: 0 0 6px rgba(63,185,80,0.4); }
  .status-indicator.planned { background: var(--planned); box-shadow: 0 0 6px rgba(56,139,253,0.4); }
  .status-indicator.neither { background: var(--neither); }

  .dest-name {
    flex: 1;
    font-size: 0.88rem;
    line-height: 1.3;
    font-weight: 400;
  }
  .dest-item.is-country .dest-name { font-weight: 500; }

  .dest-name-clean { display: block; }
  .dest-name-detail { font-size: 0.72rem; color: var(--muted); display: block; margin-top: 1px; }
  .dest-field-badge {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 4px;
    white-space: nowrap; font-weight: 500;
    border: 1px solid var(--border); color: var(--muted);
    background: var(--surface2);
  }
  .dest-field-badge.year-badge { color: var(--planned); border-color: rgba(56,139,253,0.3); background: rgba(56,139,253,0.08); }
  .dest-field-badge.status-badge.been { color: var(--been); border-color: rgba(63,185,80,0.3); background: rgba(63,185,80,0.08); }
  .dest-field-badge.status-badge.planned { color: var(--planned); border-color: rgba(56,139,253,0.3); background: rgba(56,139,253,0.08); }

  .dest-tags { display: flex; gap: 5px; flex-shrink: 0; }

  .tag {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }
  .tag.trip { background: rgba(124,58,237,0.2); color: #a78bfa; }
  .tag.cruise { background: rgba(8,145,178,0.2); color: #67e8f9; }
  .tag.vacation { background: rgba(219,39,119,0.2); color: #f9a8d4; }

  .priority-badge {
    font-size: 0.68rem;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
  }
  .priority-badge.p1 { background: rgba(255,215,0,0.2); color: var(--priority1); }
  .priority-badge.p2 { background: rgba(192,192,192,0.15); color: var(--priority2); }
  .priority-badge.p3 { background: rgba(205,127,50,0.2); color: var(--priority3); }
  .priority-badge.p4, .priority-badge.p5 { background: rgba(255,255,255,0.06); color: var(--muted); }

  /* GRID VIEW */
  .grid-container {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding: 16px 20px;
  }
  .grid-container.active { display: grid; }

  .grid-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .grid-card:hover { border-color: var(--planned); transform: translateY(-1px); }
  .grid-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .grid-card.been::before { background: var(--been); }
  .grid-card.planned::before { background: var(--planned); }
  .grid-card.neither::before { background: var(--border); }

  .grid-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .grid-card-name { font-weight: 600; font-size: 0.9rem; line-height: 1.3; }
  .grid-card-status {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
    margin-right: 8px;
  }
  .grid-card-status.been { background: rgba(63,185,80,0.15); color: var(--been); }
  .grid-card-status.planned { background: rgba(56,139,253,0.15); color: var(--planned); }
  .grid-card-status.neither { background: rgba(255,255,255,0.06); color: var(--muted); }

  .grid-card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .grid-card-trip { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  /* STATS VIEW */
  #stats-view {
    display: none;
    padding: 20px;
  }
  #stats-view.active { display: block; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .big-num { font-size: 2.5rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .stat-card .big-num.green { color: var(--been); }
  .stat-card .big-num.blue { color: var(--planned); }
  .stat-card .big-num.orange { color: var(--accent); }
  .stat-card .label { font-size: 0.8rem; color: var(--muted); }

  .continent-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .cb-title { font-weight: 700; margin-bottom: 12px; font-size: 0.9rem; }
  .cb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .cb-label { min-width: 110px; font-size: 0.82rem; }
  .cb-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
  .cb-bar-fill { height: 100%; background: linear-gradient(90deg, var(--been), var(--planned)); border-radius: 4px; }
  .cb-nums { font-size: 0.75rem; color: var(--muted); min-width: 70px; text-align: left; }

  /* LIST VIEW CONTAINER */
  #list-view { display: block; }
  #list-view.hidden { display: none; }
  #grid-view { display: none; }
  #grid-view.active { display: block; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

  /* SCROLL TO TOP */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 40px;
    height: 40px;
    background: var(--planned);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
  }
  .scroll-top.visible { opacity: 1; }

  /* Progress ring */
  .progress-ring { display: inline-block; position: relative; }

  @media (max-width: 600px) {
    .stats-bar { gap: 10px; }
    .controls { padding: 10px 14px; }
    .dest-item { padding: 9px 14px 9px 10px; }
    .dest-item:not(.is-country) { padding-right: 28px; }
  }

  /* EDIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal-sheet {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border);
    margin: 10px auto 0;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .modal-title { font-size: 1rem; font-weight: 700; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border);
    background: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 16px 20px; }

  .field-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .field-label {
    font-size: 0.8rem; color: var(--muted);
    min-width: 80px;
  }
  .field-row input[type=text], .field-row select, .field-row input[type=number] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.85rem;
    outline: none;
  }
  .field-row input:focus, .field-row select:focus { border-color: var(--planned); }

  .toggle-row {
    display: flex; gap: 8px; flex: 1;
  }
  .toggle-btn {
    flex: 1; padding: 7px 0; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg); color: var(--muted);
    font-family: 'Heebo', sans-serif; font-size: 0.82rem;
    cursor: pointer; transition: all .15s; text-align: center;
  }
  .toggle-btn.on-been  { background: rgba(63,185,80,0.15);  color: var(--been);    border-color: var(--been);    }
  .toggle-btn.on-plan  { background: rgba(56,139,253,0.15);  color: var(--planned); border-color: var(--planned); }

  .section-title {
    font-size: 0.78rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin: 16px 0 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .add-btn {
    font-size: 0.75rem; padding: 3px 10px; border-radius: 12px;
    border: 1px solid var(--border);
    background: none; color: var(--planned);
    cursor: pointer; font-family: 'Heebo', sans-serif;
  }
  .add-btn:hover { background: rgba(56,139,253,0.1); }

  .region-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; margin-bottom: 4px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px;
  }
  .region-item input[type=text] {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-family: 'Heebo', sans-serif;
    font-size: 0.85rem; outline: none; min-width: 0;
  }
  .region-status-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
  }
  .region-status-dot.been    { background: var(--been); }
  .region-status-dot.planned { background: var(--planned); }
  .region-status-dot.neither { background: var(--neither); }
  .region-del {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border);
    background: none; color: var(--muted);
    cursor: pointer; font-size: 0.9rem; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .region-del:hover { border-color: #f85149; color: #f85149; }

  .region-mini-selects { display: flex; gap: 6px; flex-shrink: 0; }
  .region-mini-selects select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 5px;
    color: var(--text); font-family: 'Heebo', sans-serif;
    font-size: 0.72rem; outline: none; cursor: pointer;
  }

  .modal-actions {
    display: flex; gap: 8px; padding: 12px 20px 20px;
    border-top: 1px solid var(--border); margin-top: 8px;
  }
  .btn-save {
    flex: 1; padding: 10px; border-radius: 10px;
    border: none; background: var(--planned);
    color: white; font-family: 'Heebo', sans-serif;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
  }
  .btn-save:hover { opacity: 0.9; }
  .btn-cancel {
    padding: 10px 20px; border-radius: 10px;
    border: 1px solid var(--border);
    background: none; color: var(--muted);
    font-family: 'Heebo', sans-serif; font-size: 0.9rem;
    cursor: pointer;
  }
  .btn-delete {
    padding: 10px 16px; border-radius: 10px;
    border: 1px solid #f85149;
    background: none; color: #f85149;
    font-family: 'Heebo', sans-serif; font-size: 0.9rem;
    cursor: pointer;
  }
  .btn-delete:hover { background: rgba(248,81,73,0.1); }

  .dest-item { cursor: pointer; }
  .country-regions { border-right: 2px solid var(--border); margin-right: 28px; }
  .country-regions.collapsed { display: none; }
  .region-toggle-btn {

    font-size: 0.68rem; color: var(--muted); opacity: 0;
    transition: opacity .15s; margin-right: 4px; flex-shrink: 0;
  }


  /* TIMELINE */
  .year-block {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .year-header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;

  .year-header:hover { background: var(--surface2); }
  .year-num { font-size: 1.1rem; font-weight: 900; min-width: 50px; }
  .year-age { font-size: 0.78rem; color: var(--muted); }
  .year-chips { display:flex; gap:6px; flex-wrap:wrap; flex:1; }
  .year-chip {
    font-size: 0.72rem; padding: 2px 10px; border-radius: 10px;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .year-chip.been { background: rgba(63,185,80,0.15); color: var(--been); border-color: var(--been); }
  .year-chip.planned { background: rgba(56,139,253,0.15); color: var(--planned); border-color: var(--planned); }

  .quarters-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--bg);
  }
  @media (max-width: 600px) {
    .quarters-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .quarter-cell {
    padding: 12px 14px;
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 80px;
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .quarter-cell:first-child { border-right: 1px solid var(--border); }
  .quarter-cell:hover { background: var(--surface); }
  .quarter-cell.has-trip { background: var(--surface); }
  .quarter-label {
    font-size: 0.68rem; color: var(--muted); margin-bottom: 6px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .trip-entry {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 5px 8px; border-radius: 6px; margin-bottom: 4px;
    font-size: 0.78rem; line-height: 1.3;
    cursor: pointer; transition: opacity .1s;
  }
  .trip-entry:hover { opacity: 0.8; }
  .trip-entry.been { background: rgba(63,185,80,0.15); color: var(--been); }
  .trip-entry.planned { background: rgba(56,139,253,0.15); color: var(--planned); }
  .trip-entry.empty-slot {
    background: none; color: var(--muted); opacity: 0.5;
    border: 1px dashed var(--border); font-size: 0.7rem;
    justify-content: center; padding: 3px;
  }
  .trip-entry.empty-slot:hover { opacity: 1; border-color: var(--planned); color: var(--planned); }
  .add-quarter-btn {
    position: absolute; bottom: 6px; left: 6px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid var(--border); background: none;
    color: var(--muted); font-size: 0.9rem; cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    opacity: 0; transition: opacity .15s;
  }
  .quarter-cell:hover .add-quarter-btn { opacity: 1; }
  .add-quarter-btn:hover { border-color: var(--planned); color: var(--planned); }


  /* CONFIRM DIALOG */
  #confirmOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 500;
    align-items: center; justify-content: center;
  }
  #confirmOverlay.open { display: flex; }
  #confirmBox {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px 24px 18px;
    max-width: 320px; width: 90%; text-align: center;
  }
  #confirmMsg {
    font-size: 0.92rem; line-height: 1.5;
    color: var(--text); margin-bottom: 20px;
  }
  #confirmMsg strong { display: block; font-size: 1rem; margin-bottom: 6px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button { flex: 1; padding: 10px; border-radius: 8px;
    font-family: 'Heebo', sans-serif; font-size: 0.88rem; cursor: pointer; }
  #confirmYes { background: #f85149; border: none; color: white; font-weight: 700; }
  #confirmNo  { background: none; border: 1px solid var(--border); color: var(--muted); }


  /* iOS / PWA */
  * { -webkit-tap-highlight-color: transparent; }
  body {
    padding-bottom: max(70px, calc(70px + env(safe-area-inset-bottom)));
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;

  /* Larger tap targets on mobile */
  .dest-item { min-height: 48px; }
  .pill, .view-btn, select, input { font-size: 16px !important; } /* prevent iOS zoom on focus */
  input[type="number"] { font-size: 16px !important; }

</style>

// Safe storage wrapper (handles file:// where localStorage is blocked)
const store = (() => {
  let mem = {};
  try { localStorage.setItem('_test','1'); localStorage.removeItem('_test'); }
  catch(e) { return { get: k => mem[k]||null, set: (k,v) => { mem[k]=v; }, remove: k => { delete mem[k]; } }; }
  return { get: k => localStorage.getItem(k), set: (k,v) => localStorage.setItem(k,v), remove: k => localStorage.removeItem(k) };
})();

// Load from storage or use initial data
let RAW_DATA;
try {
  const saved = store.get('travelsData');
  if (saved) {
    const stored = JSON.parse(saved);
    const storedMap = {};
    stored.forEach(d => { storedMap[d.name.trim().toLowerCase()] = d; });
    const initNames = new Set();
    const merged = INITIAL_DATA.map(init => {
      const key = init.name.trim().toLowerCase();
      initNames.add(key);
      return storedMap[key] !== undefined ? storedMap[key] : {...init};
    });
    stored.forEach(d => {
      if (!initNames.has(d.name.trim().toLowerCase())) merged.push(d);
    });
    RAW_DATA = merged;
  } else {
    RAW_DATA = INITIAL_DATA.map(d => ({...d}));
  }
} catch(e) {
  RAW_DATA = INITIAL_DATA.map(d => ({...d}));
}

function saveData() {
  try { store.set('travelsData', JSON.stringify(RAW_DATA)); } catch(e) { console.error('saveData:', e); }
  renderStats();
  render();
}

const CONTINENT_FLAGS = {
  'Europe': '🇪🇺', 'Asia': '🌏', 'North America': '🌎',
  'Africa': '🌍', 'South America': '🌎', 'Oceania': '🦘', 'Other': '🌐'
};
const CONTINENT_ORDER = ['Europe','Asia','North America','Africa','South America','Oceania','Other'];

function cleanName(name) {
  // Remove country code suffixes like (EU), (AS), etc. and "british", "usa", etc.
  return name
    .replace(/\s*\((?:EU|AS|AF|NA|SA|AU|AU\s*-\s*Oceania)[^)]*\)/gi, '')
    .replace(/\s*(british|usa|netherlands|french|danish|australian|new zealand)\s*$/i, '')
    .replace(/\s*\(EU\s*-\s*Portugal\)/i,'')
    .replace(/\bwith\s+\w+\s+as its Capital:.*$/i, '')
    .replace(/:\s*.*$/, '')
    .trim();
}

// State
let activeFilter = 'all';
let searchQuery = '';
let continentFilter = 'all';
let typeFilter = 'all';
let priorityFilter = 'all';
let currentView = 'list';
// Load collapse state from storage
let collapsedContinents = new Set(JSON.parse(store.get('collapsedContinents') || '[]'));
let collapsedCountries = new Set(JSON.parse(store.get('collapsedCountries') || '[]'));

function getStatus(d) {
  if (d.been && d.planned) return 'been';
  if (d.been) return 'been';
  if (d.planned) return 'planned';
  return 'neither';
}

function matchesFilter(d) {
  const status = getStatus(d);
  if (activeFilter === 'been' && !d.been) return false;
  if (activeFilter === 'planned' && !d.planned) return false;
  if (activeFilter === 'neither' && (d.been || d.planned)) return false;
  if (continentFilter !== 'all' && d.continent !== continentFilter) return false;
  if (typeFilter !== 'all' && d.type?.toLowerCase().trim() !== typeFilter.toLowerCase()) return false;
  if (priorityFilter !== 'all' && d.priority !== parseInt(priorityFilter)) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const clean = cleanName(d.name).toLowerCase();
    const full = d.name.toLowerCase();
    const trip = (d.tripName || '').toLowerCase();
    if (!clean.includes(q) && !full.includes(q) && !trip.includes(q)) return false;
  }
  return true;
}

function renderStats() {
  const total = RAW_DATA.length;
  const been = RAW_DATA.filter(d => d.been).length;
  const planned = RAW_DATA.filter(d => d.planned && !d.been).length;
  const neither = RAW_DATA.filter(d => !d.been && !d.planned).length;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat"><span class="stat-dot been"></span><span><strong>${been}</strong> ביקרתי</span></div>
    <div class="stat"><span class="stat-dot planned"></span><span><strong>${planned}</strong> מתוכנן</span></div>
    <div class="stat"><span class="stat-dot neither"></span><span><strong>${neither}</strong> פתוח</span></div>
    <div class="stat"><span style="color:var(--muted)">|</span><span><strong>${total}</strong> סה"כ</span></div>
  `;
}

function renderStatsView() {
  const total = RAW_DATA.length;
  const been = RAW_DATA.filter(d => d.been).length;
  const planned = RAW_DATA.filter(d => d.planned).length;
  const bothBeenPlanned = RAW_DATA.filter(d => d.been && d.planned).length;
  const trips = RAW_DATA.filter(d => d.type?.trim() === 'Trip').length;
  const cruises = RAW_DATA.filter(d => d.type?.trim() === 'Cruise').length;
  const vacations = RAW_DATA.filter(d => d.type?.toLowerCase().trim() === 'vacation').length;
  const priority1 = RAW_DATA.filter(d => d.priority === 1).length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="big-num green">${been}</div><div class="label">יעדים שביקרתי</div></div>
    <div class="stat-card"><div class="big-num blue">${planned}</div><div class="label">יעדים מתוכננים</div></div>
    <div class="stat-card"><div class="big-num orange">${total}</div><div class="label">סה"כ יעדים</div></div>
    <div class="stat-card"><div class="big-num" style="color:var(--priority1)">${priority1}</div><div class="label">יעדים בעדיפות 1</div></div>
    <div class="stat-card"><div class="big-num" style="color:#a78bfa">${trips}</div><div class="label">טיולים (Trip)</div></div>
    <div class="stat-card"><div class="big-num" style="color:#67e8f9">${cruises}</div><div class="label">קרוזים (Cruise)</div></div>
    <div class="stat-card"><div class="big-num" style="color:#f9a8d4">${vacations}</div><div class="label">חופשות (Vacation)</div></div>
    <div class="stat-card"><div class="big-num" style="color:var(--accent)">${bothBeenPlanned}</div><div class="label">ביקרתי + רוצה לחזור</div></div>
  `;

  const cbHtml = CONTINENT_ORDER.map(cont => {
    const items = RAW_DATA.filter(d => d.continent === cont);
    if (items.length === 0) return '';
    const b = items.filter(d => d.been).length;
    const p = items.filter(d => d.planned).length;
    const pct = Math.round((b / items.length) * 100);
    return `<div class="cb-row">
      <div class="cb-label">${CONTINENT_FLAGS[cont]} ${cont}</div>
      <div class="cb-bar-wrap"><div class="cb-bar-fill" style="width:${pct}%"></div></div>
      <div class="cb-nums">✅${b} 📌${p} / ${items.length}</div>
    </div>`;
  }).join('');
  document.getElementById('continentBreakdown').innerHTML = cbHtml;
}

function render() {
  const filtered = RAW_DATA.filter(matchesFilter);

  document.getElementById('resultsInfo').textContent =
    `מציג ${filtered.length} יעדים מתוך ${RAW_DATA.length}`;

  if (currentView === 'stats') {
    renderStatsView();
    return;
  }

  // Group by continent
  const grouped = {};
  filtered.forEach(d => {
    const c = d.continent || 'Other';
    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(d);
  });

  const container = document.getElementById('listContainer');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><div>לא נמצאו יעדים</div></div>';
    return;
  }

  const html = CONTINENT_ORDER.filter(c => grouped[c])
    .map(cont => {
      const items = grouped[cont];
      const beenCount = items.filter(d => d.been).length;
      const plannedCount = items.filter(d => d.planned && !d.been).length;
      const isCollapsed = collapsedContinents.has(cont);

      // Build country→regions structure for this continent
      const countryBlocks = [];
      let i = 0;
      while (i < items.length) {
        const d = items[i];
        if (d.isCountry) {
          // Collect sub-regions immediately following
          const subItems = [];
          let j = i + 1;
          while (j < items.length && !items[j].isCountry) {
            subItems.push(items[j]);
            j++;
          }
          countryBlocks.push({ country: d, regions: subItems });
          i = j;
        } else {
          // Orphan region — show as standalone
          countryBlocks.push({ country: d, regions: [] });
          i++;
        }
      }

      const itemsHtml = countryBlocks.map(({ country: d, regions }) => {
        const status = getStatus(d);
        const cn = cleanName(d.name);
        const typeClass = d.type ? d.type.toLowerCase().trim() : '';
        const typeLabel = d.type?.trim() === 'TrIp' ? 'Trip' : d.type?.trim();
        const pClass = d.priority ? `p${Math.min(d.priority, 5)}` : '';
        const idx = RAW_DATA.indexOf(d);
        const statusLabel = d.been && d.planned ? 'ביקרתי+חוזר' : d.been ? 'ביקרתי' : d.planned ? 'מתוכנן' : '';
        const statusCls = d.been ? 'been' : d.planned ? 'planned' : '';
        const hasRegions = regions.length > 0;
        const countryKey = d.name;
        const isCollapsedCountry = collapsedCountries.has(countryKey);

        const countryRow = `<div class="dest-item is-country" style="cursor:pointer;">
          ${hasRegions ? `<button class="region-toggle-btn" onclick="toggleCountryRegions('${countryKey.replace(/'/g,"\'")}')" title="${isCollapsedCountry ? 'פתח אזורים' : 'סגור אזורים'}">${isCollapsedCountry ? '+' : '−'}</button>` : '<span style="width:20px;flex-shrink:0;"></span>'}
          <span class="status-indicator ${status}"></span>
          <div class="dest-name" onclick="openEdit(${idx})" style="flex:1;min-width:0;">
            <span class="dest-name-clean">${cn}</span>
            ${d.tripName ? `<span class="dest-name-detail">📍 ${d.tripName}</span>` : ''}
          </div>
          <div class="dest-tags">
            ${d.year ? `<span class="dest-field-badge year-badge">📅 ${d.year}${d.quarter ? ' Q'+d.quarter : ''}</span>` : ''}
            ${statusLabel ? `<span class="dest-field-badge status-badge ${statusCls}">${statusLabel}</span>` : ''}
            ${d.priority ? `<span class="priority-badge ${pClass}">${d.priority}</span>` : ''}
            <span class="edit-hint">✎</span>
          </div>
        </div>`;

        if (!hasRegions) return countryRow;

        const regionsHtml = regions.map(r => {
          const rs = getStatus(r);
          const rcn = cleanName(r.name);
          const ridx = RAW_DATA.indexOf(r);
          const rStatusLabel = r.been && r.planned ? 'ביקרתי+חוזר' : r.been ? 'ביקרתי' : r.planned ? 'מתוכנן' : '';
          const rStatusCls = r.been ? 'been' : r.planned ? 'planned' : '';
          const rpClass = r.priority ? `p${Math.min(r.priority, 5)}` : '';
          return `<div class="dest-item" onclick="openEdit(${ridx})">
            <span class="status-indicator ${rs}"></span>
            <div class="dest-name" style="flex:1;min-width:0;">
              <span class="dest-name-clean">${rcn}</span>
              ${r.tripName ? `<span class="dest-name-detail">📍 ${r.tripName}</span>` : ''}
            </div>
            <div class="dest-tags">
              ${r.year ? `<span class="dest-field-badge year-badge">📅 ${r.year}${r.quarter ? ' Q'+r.quarter : ''}</span>` : ''}
              ${rStatusLabel ? `<span class="dest-field-badge status-badge ${rStatusCls}">${rStatusLabel}</span>` : ''}
              ${r.priority ? `<span class="priority-badge ${rpClass}">${r.priority}</span>` : ''}
              <span class="edit-hint">✎</span>
            </div>
          </div>`;
        }).join('');

        return countryRow + `<div class="country-regions ${isCollapsedCountry ? 'collapsed' : ''}">${regionsHtml}</div>`;
      }).join('');

      return `<div class="continent-section">
        <div class="continent-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleContinent('${cont}')">
          <span class="continent-flag">${CONTINENT_FLAGS[cont] || '🌐'}</span>
          <span class="continent-name">${cont}</span>
          <div class="continent-counts">
            ${beenCount ? `<span class="cnt-badge been">✅ ${beenCount}</span>` : ''}
            ${plannedCount ? `<span class="cnt-badge planned">📌 ${plannedCount}</span>` : ''}
            <span class="cnt-badge total">${items.length}</span>
          </div>
          <span class="collapse-icon">▾</span>
        </div>
        <div class="destinations-list ${isCollapsed ? 'collapsed' : ''}">
          ${itemsHtml}
        </div>
      </div>`;
    }).join('');

  container.innerHTML = html;
}

function toggleCountryRegions(key) {
  if (collapsedCountries.has(key)) {
    collapsedCountries.delete(key);
  } else {
    collapsedCountries.add(key);
  }
  try { store.set('collapsedCountries', JSON.stringify([...collapsedCountries])); } catch(e) {}
  render();
}

function toggleContinent(cont) {
  if (collapsedContinents.has(cont)) {
    collapsedContinents.delete(cont);
  } else {
    collapsedContinents.add(cont);
  }
  try { store.set('collapsedContinents', JSON.stringify([...collapsedContinents])); } catch(e) {}
  render();
}

let mapInitialized = false;
let worldTopo = null;
let mapFilter = 'all';
let mapContinent = 'world';

function getFillColor(name) {
  const d = MAP_DATA[name];
  if (!d) return getComputedStyle(document.body).getPropertyValue('--surface2').trim() || '#2a2a2a';
  if (d.b && d.p) return '#1D9E75';
  if (d.b) return '#5DCAA5';
  if (d.p) return '#388bfd';
  return getComputedStyle(document.body).getPropertyValue('--neither').trim() || '#2d333b';
}

function mapMatchFilter(name) {
  if (mapFilter === 'all') return true;
  const d = MAP_DATA[name];
  if (!d) return mapFilter === 'neither';
  if (mapFilter === 'been') return d.b;
  if (mapFilter === 'planned') return d.p && !d.b;
  if (mapFilter === 'neither') return !d.b && !d.p;
  return true;
}

function updateMapStats(features) {
  let b=0,p=0,n=0;
  features.forEach(f => {
    const d = MAP_DATA[f.properties.name];
    if (!d) { n++; return; }
    if (d.b) b++;
    else if (d.p) p++;
    else n++;
  });
  document.getElementById('ms-been').textContent = b;
  document.getElementById('ms-planned').textContent = p;
  document.getElementById('ms-neither').textContent = n;
  document.getElementById('ms-total').textContent = features.length;
}

// Zoom state — initialized to null, set to d3.zoomIdentity when map loads
let currentZoomTransform = null;

function drawWorldMap() {
  if (!worldTopo) return;
  const wrap = document.getElementById('map-svg-wrap');
  wrap.innerHTML = '';
  const isDark = document.body.classList.contains('theme-dark');
  const W = wrap.offsetWidth || 700;
  const H = Math.round(W * 0.56);
  const cv = CONT_VIEWS[mapContinent];

  let baseProj;
  if (mapContinent === 'world') {
    baseProj = d3.geoNaturalEarth1().scale(W / 6.3).translate([W/2, H/2]);
  } else {
    baseProj = d3.geoMercator().scale(cv.scale * (W/700)).center([cv.cx, cv.cy]).translate([W/2, H/2]);
  }

  const path = d3.geoPath(baseProj);
  const features = topojson.feature(worldTopo, worldTopo.objects.countries).features;
  updateMapStats(features);

  const bgColor = isDark ? '#0a1020' : '#c8dff0';
  const strokeColor = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.7)';
  const labelColor = isDark ? 'rgba(255,255,255,0.75)' : 'rgba(0,0,0,0.65)';

  const svg = d3.select(wrap).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', '100%')
    .attr('height', H)
    .style('cursor', 'grab')
    .style('display', 'block');

  svg.append('rect').attr('width', W).attr('height', H).attr('fill', bgColor);

  const g = svg.append('g').attr('class', 'map-g');

  // Country paths
  g.selectAll('path.mc')
    .data(features)
    .join('path')
    .attr('class', 'mc')
    .attr('d', path)
    .attr('fill', d => {
      const n = d.properties.name;
      if (mapFilter !== 'all' && !mapMatchFilter(n)) return isDark ? '#1a2030' : '#dde8f0';
      return getFillColor(n);
    })
    .attr('stroke', strokeColor)
    .attr('stroke-width', 0.5)
    .style('cursor', 'pointer');

  // Country name labels — show based on zoom level
  // Build labels ONCE — they live inside g and move with it automatically
  const labelsG = g.append('g').attr('class', 'labels-g');
  const SHORT_NAMES = {
    'United States of America': 'USA', 'United Kingdom': 'UK',
    'Dominican Republic': 'Dom. Rep.', 'Central African Republic': 'CAR',
    'Democratic Republic of the Congo': 'DR Congo', 'Dem. Rep. Congo': 'DR Congo',
    'Bosnia and Herzegovina': 'B&H', 'Trinidad and Tobago': 'T&T',
    'Papua New Guinea': 'PNG', 'New Zealand': 'NZ',
    'South Africa': 'S. Africa', 'Saudi Arabia': 'S. Arabia',
    'United Arab Emirates': 'UAE', 'North Korea': 'N. Korea',
    'South Korea': 'S. Korea', 'Czech Republic': 'Czechia',
    'Russian Federation': 'Russia',
  };

  // Pre-compute bounds for all features
  const featureData = features.map(f => {
    const bounds = path.bounds(f);
    const bw = bounds[1][0] - bounds[0][0];
    const bh = bounds[1][1] - bounds[0][1];
    const area = bw * bh;
    const centroid = path.centroid(f);
    const name = f.properties.name;
    let label = SHORT_NAMES[name] || name;
    // Keep label short but readable
    if (label.length > 12 && !SHORT_NAMES[name]) {
      const words = label.split(' ');
      label = words.length > 1 ? words.map(w => w[0]).join('') : label.slice(0, 8);
    }
    const baseFontSize = Math.max(6, Math.min(12, Math.sqrt(area) * 0.085));
    return { f, name, label, area, centroid, baseFontSize };
  }).filter(d => d.area > 0 && d.centroid && !isNaN(d.centroid[0]) && !isNaN(d.centroid[1]));

  // Draw all labels — hidden initially for small ones
  featureData.forEach(d => {
    labelsG.append('text')
      .attr('class', 'country-label')
      .attr('data-area', d.area)
      .attr('data-base-fs', d.baseFontSize)
      .attr('x', d.centroid[0])
      .attr('y', d.centroid[1])
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', d.baseFontSize)
      .attr('font-family', 'Heebo, sans-serif')
      .attr('font-weight', '500')
      .attr('fill', labelColor)
      .attr('pointer-events', 'none')
      .attr('opacity', d.area > 8000 ? 1 : 0)
      .style('text-shadow', isDark ? '0 1px 3px rgba(0,0,0,0.9)' : '0 1px 2px rgba(255,255,255,0.9)')
      .text(d.label);
  });

  // Update label visibility and size on zoom — no DOM rebuild
  function updateLabels(k) {
    const minArea = k < 1.5 ? 8000 : k < 3 ? 2000 : k < 5 ? 600 : k < 10 ? 150 : 30;
    labelsG.selectAll('text.country-label').each(function() {
      const el = d3.select(this);
      const area = +el.attr('data-area');
      const baseFs = +el.attr('data-base-fs');
      // Scale font inversely with zoom so text stays readable but not huge
      const fs = Math.max(6, Math.min(14, baseFs / Math.sqrt(k) * 1.4));
      el.attr('opacity', area >= minArea ? 1 : 0)
        .attr('font-size', fs);
    });
  }

  updateLabels(currentZoomTransform ? currentZoomTransform.k : 1);

  // Tooltip
  const tt = document.getElementById('map-tooltip');
  g.selectAll('path.mc')
    .on('mousemove', function(event, d) {
      const n = d.properties.name;
      const info = MAP_DATA[n];
      let statusText = 'לא ברשימה';
      if (info) {
        if (info.b && info.p) statusText = 'ביקרתי + רוצה לחזור';
        else if (info.b) statusText = 'ביקרתי';
        else if (info.p) statusText = 'מתוכנן';
        else statusText = 'לא מתוכנן';
      }
      document.getElementById('mtt-name').textContent = n;
      document.getElementById('mtt-info').textContent = statusText;
      const rect = wrap.getBoundingClientRect();
      const x = event.clientX - rect.left + 14;
      const y = event.clientY - rect.top - 14;
      tt.style.left = Math.min(x, W - 200) + 'px';
      tt.style.top = Math.max(0, y) + 'px';
      tt.style.opacity = '1';
    })
    .on('mouseleave', () => { tt.style.opacity = '0'; })
    .on('mouseover', function() {
      d3.select(this).attr('stroke-width', 2).attr('opacity', 0.82);
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke-width', 0.5).attr('opacity', 1);
    });

  // Zoom & Pan
  const zoom = d3.zoom()
    .scaleExtent([0.5, 20])
    .on('zoom', function(event) {
      currentZoomTransform = event.transform;
      const k = event.transform.k;
      g.attr('transform', event.transform);
      updateLabels(k);
      g.selectAll('path.mc').attr('stroke-width', 0.5 / k);
      svg.style('cursor', 'grabbing');
    })
    .on('end', function() {
      svg.style('cursor', 'grab');
    });

  svg.call(zoom);

  // Apply stored transform (persist zoom across redraws)
  if (currentZoomTransform && currentZoomTransform.k !== 1) {
    svg.call(zoom.transform, currentZoomTransform);
  } else {
    currentZoomTransform = d3.zoomIdentity;
  }

  // Zoom buttons
  document.getElementById('map-zoom-in').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.6);
  document.getElementById('map-zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.625);
  document.getElementById('map-zoom-reset').onclick = () => {
    currentZoomTransform = null;
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
  };
}

// ---- EDIT MODAL ----
let editIndex = -1;
let editBeen = false;
let editPlanned = false;

function openEdit(idx) {
  editIndex = idx;
  const d = RAW_DATA[idx];
  editBeen = !!d.been;
  editPlanned = !!d.planned;

  document.getElementById('modalTitle').textContent = d.isCountry ? 'עריכת מדינה / אזור' : 'עריכת אזור';
  document.getElementById('edit-name').value = cleanName(d.name);
  document.getElementById('edit-priority').value = d.priority || '';
  document.getElementById('edit-type').value = d.type?.trim() === 'TrIp' ? 'Trip' : (d.type?.trim() || '');
  document.getElementById('edit-tripName').value = d.tripName || '';
  document.getElementById('edit-tripCode').value = d.tripCode || '';
  document.getElementById('edit-year').value = d.year || '';
  document.getElementById('edit-quarter').value = d.quarter || '';

  updateStatusBtns();

  // Show sub-regions if this is a country
  const regionsSection = document.getElementById('regions-section');
  if (d.isCountry) {
    regionsSection.style.display = 'block';
    renderRegionsList(idx);
  } else {
    regionsSection.style.display = 'none';
  }

  // restore buttons in case we were in add-new mode
  document.getElementById('dest-save-btn').onclick = saveEdit;
  document.getElementById('dest-delete-btn').style.display = '';
  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('editModal')) closeModal();
}

function toggleStatus(which) {
  if (which === 'been') editBeen = !editBeen;
  if (which === 'plan') editPlanned = !editPlanned;
  updateStatusBtns();
}

function updateStatusBtns() {
  const bb = document.getElementById('btn-been');
  const bp = document.getElementById('btn-planned');
  bb.className = 'toggle-btn' + (editBeen ? ' on-been' : '');
  bp.className = 'toggle-btn' + (editPlanned ? ' on-plan' : '');
}

function getRegionStatus(d) {
  if (d.been && d.planned) return 'been';
  if (d.been) return 'been';
  if (d.planned) return 'planned';
  return 'neither';
}

function renderRegionsList(parentIdx) {
  const parent = RAW_DATA[parentIdx];
  // Find all sub-items that follow this country until the next country
  const subItems = [];
  for (let i = parentIdx + 1; i < RAW_DATA.length; i++) {
    if (RAW_DATA[i].isCountry) break;
    if (RAW_DATA[i].continent === parent.continent || !RAW_DATA[i].isCountry) {
      subItems.push({ idx: i, d: RAW_DATA[i] });
    }
  }

  const list = document.getElementById('regions-list');
  list.innerHTML = subItems.map(({ idx, d }) => {
    const cn = cleanName(d.name);
    const st = getRegionStatus(d);
    const typeVal = d.type?.trim() === 'TrIp' ? 'Trip' : (d.type?.trim() || '');
    return `<div class="region-item" data-idx="${idx}" style="flex-wrap:wrap;gap:6px;">
      <div style="display:flex;align-items:center;gap:6px;width:100%;">
        <span class="region-status-dot ${st}" title="לחץ לשינוי סטטוס" onclick="cycleRegionStatus(${idx}, this)"></span>
        <input type="text" value="${cn}" onchange="updateRegionName(${idx}, this.value)" placeholder="שם האזור" style="flex:1;min-width:0;">
        <div class="region-mini-selects">
          <select onchange="updateRegionType(${idx}, this.value)" title="סוג">
            <option value="" ${!typeVal?'selected':''}>—</option>
            <option value="Trip" ${typeVal==='Trip'?'selected':''}>Trip</option>
            <option value="Cruise" ${typeVal==='Cruise'?'selected':''}>Cruise</option>
            <option value="Vacation" ${typeVal==='Vacation'?'selected':''}>Vacation</option>
          </select>
          <select onchange="updateRegionPriority(${idx}, this.value)" title="עדיפות">
            <option value="" ${!d.priority?'selected':''}>—</option>
            <option value="1" ${d.priority==1?'selected':''}>1</option>
            <option value="2" ${d.priority==2?'selected':''}>2</option>
            <option value="3" ${d.priority==3?'selected':''}>3</option>
            <option value="4" ${d.priority==4?'selected':''}>4</option>
            <option value="5" ${d.priority==5?'selected':''}>5</option>
          </select>
        </div>
        <button class="region-del" onclick="deleteRegion(${idx})" title="מחק אזור">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding-right:20px;width:100%;">
        <span style="font-size:0.7rem;color:var(--muted);white-space:nowrap;">📅 שנה</span>
        <input type="number" value="${d.year||''}" min="2020" max="2060" placeholder="שנה"
          onchange="updateRegionYear(${idx}, this.value)"
          style="width:80px;flex:none;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 6px;color:var(--text);font-size:0.78rem;outline:none;">
        <span style="font-size:0.7rem;color:var(--muted);white-space:nowrap;">רבעון</span>
        <select onchange="updateRegionQuarter(${idx}, this.value)"
          style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 5px;color:var(--text);font-size:0.78rem;outline:none;cursor:pointer;">
          <option value="" ${!d.quarter?'selected':''}>—</option>
          <option value="1" ${d.quarter==1?'selected':''}>Q1</option>
          <option value="2" ${d.quarter==2?'selected':''}>Q2</option>
          <option value="3" ${d.quarter==3?'selected':''}>Q3</option>
          <option value="4" ${d.quarter==4?'selected':''}>Q4</option>
        </select>
      </div>
    </div>`;
  }).join('');
}

function cycleRegionStatus(idx, el) {
  const d = RAW_DATA[idx];
  if (!d.been && !d.planned) { d.been = false; d.planned = true; }
  else if (!d.been && d.planned) { d.been = true; d.planned = false; }
  else if (d.been && !d.planned) { d.been = true; d.planned = true; }
  else { d.been = false; d.planned = false; }
  const st = getRegionStatus(d);
  el.className = 'region-status-dot ' + st;
}

function updateRegionName(idx, val) {
  RAW_DATA[idx].name = val.trim();
}
function updateRegionType(idx, val) {
  RAW_DATA[idx].type = val || null;
}
function updateRegionPriority(idx, val) {
  RAW_DATA[idx].priority = val ? parseInt(val) : null;
}
function updateRegionYear(idx, val) {
  RAW_DATA[idx].year = val ? parseInt(val) : null;
  syncRegionToTrips(idx);
}
function updateRegionQuarter(idx, val) {
  RAW_DATA[idx].quarter = val ? parseInt(val) : null;
  syncRegionToTrips(idx);
}
function syncRegionToTrips(idx) {
  const d = RAW_DATA[idx];
  if (!d.year || !d.quarter) return;
  const cn = cleanName(d.name);
  const isFuture = d.year > new Date().getFullYear() ||
    (d.year === new Date().getFullYear() && d.quarter >= Math.ceil((new Date().getMonth()+1)/3));
  const been = isFuture ? false : d.been;
  const planned = isFuture ? true : d.planned;
  const existing = TRIP_DATA.findIndex(t => t.dest === cn && t.year === d.year && t.quarter === d.quarter);
  if (existing >= 0) {
    TRIP_DATA[existing].been = been;
    TRIP_DATA[existing].planned = planned;
  } else {
    TRIP_DATA.push({ year: d.year, quarter: d.quarter, dest: cn, been, planned, notes: '', age: d.year - 1966 });
    TRIP_DATA.sort((a,b) => a.year !== b.year ? a.year - b.year : a.quarter - b.quarter);
  }
  saveTrips();
}

function deleteRegion(idx) {
  const name = cleanName(RAW_DATA[idx].name);
  askConfirm('מחיקת אזור', 'האם למחוק את "' + name + '"?<br><span style="font-size:0.8rem;color:var(--muted);">לא ניתן לשחזר</span>', () => {
    RAW_DATA.splice(idx, 1);
    if (idx < editIndex) editIndex--;
    renderRegionsList(editIndex);
  });
}

function addRegion() {
  const parent = RAW_DATA[editIndex];
  // Insert after all existing sub-items of this parent
  let insertAt = editIndex + 1;
  while (insertAt < RAW_DATA.length && !RAW_DATA[insertAt].isCountry) insertAt++;

  const newRegion = {
    name: 'אזור חדש',
    priority: null,
    been: false,
    planned: false,
    type: null,
    tripCode: parent.tripCode || null,
    tripName: parent.tripName || null,
    isCountry: false,
    continent: parent.continent
  };
  RAW_DATA.splice(insertAt, 0, newRegion);
  // editIndex stays the same, re-render regions
  renderRegionsList(editIndex);
}

function saveEdit() {
  if (editIndex < 0) return;
  const d = RAW_DATA[editIndex];
  const nameInput = document.getElementById('edit-name').value.trim();
  if (nameInput) d.name = nameInput;
  d.been = editBeen;
  d.planned = editPlanned;
  const pv = document.getElementById('edit-priority').value;
  d.priority = pv ? parseInt(pv) : null;
  const tv = document.getElementById('edit-type').value;
  d.type = tv || null;
  d.tripName = document.getElementById('edit-tripName').value.trim() || null;
  d.tripCode = document.getElementById('edit-tripCode').value.trim() || null;
  const yrv = document.getElementById('edit-year').value;
  const qrv = document.getElementById('edit-quarter').value;
  d.year = yrv ? parseInt(yrv) : null;
  d.quarter = qrv ? parseInt(qrv) : null;
  // Sync to TRIP_DATA if year+quarter set
  if (d.year && d.quarter) {
    const cn = cleanName(d.name);
    const existing = TRIP_DATA.findIndex(t => t.year === d.year && t.quarter === d.quarter && t.dest === cn);
    if (existing >= 0) {
      TRIP_DATA[existing].been = d.been;
      TRIP_DATA[existing].planned = d.planned;
    } else {
      const isFuture = d.year > new Date().getFullYear() || (d.year === new Date().getFullYear() && d.quarter >= Math.ceil((new Date().getMonth()+1)/3));
      TRIP_DATA.push({ year: d.year, quarter: d.quarter, dest: cn, been: isFuture ? false : d.been, planned: isFuture ? true : d.planned, notes: d.tripName || '', age: d.year - 1966 });
      TRIP_DATA.sort((a,b) => a.year !== b.year ? a.year - b.year : a.quarter - b.quarter);
    }
    saveTrips();
  }
  saveData();
  closeModal();
}

function deleteItem() {
  const d = RAW_DATA[editIndex];
  const nm = cleanName(d.name);
  askConfirm('מחיקת יעד', 'האם למחוק את "' + nm + '"?<br><span style="font-size:0.8rem;color:var(--muted);">אזורים תחת המדינה לא יימחקו</span>', () => {
    RAW_DATA.splice(editIndex, 1);
    saveData();
    closeModal();
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function openAddNew() {
  editIndex = -1;
  editBeen = false;
  editPlanned = false;
  document.getElementById('modalTitle').textContent = 'הוסף יעד חדש';
  document.getElementById('edit-name').value = '';
  document.getElementById('edit-priority').value = '';
  document.getElementById('edit-type').value = '';
  document.getElementById('edit-tripName').value = '';
  document.getElementById('edit-tripCode').value = '';
  document.getElementById('edit-year').value = '';
  document.getElementById('edit-quarter').value = '';
  document.getElementById('regions-section').style.display = 'none';

  // Override save for new item
  document.getElementById('dest-save-btn').onclick = saveNewItem;
  document.getElementById('dest-delete-btn').style.display = 'none';

function saveNewItem() {
  const nameInput = document.getElementById('edit-name').value.trim();
  if (!nameInput) { askConfirm('שגיאה', 'נא להזין שם ליעד', () => {}); return; }
  const pv = document.getElementById('edit-priority').value;
  const tv = document.getElementById('edit-type').value;
  const contSel = document.getElementById('continentFilter').value;
  const yrv2 = document.getElementById('edit-year').value;
  const qrv2 = document.getElementById('edit-quarter').value;
  const newItem = {
    name: nameInput,
    priority: pv ? parseInt(pv) : null,
    been: editBeen,
    planned: editPlanned,
    type: tv || null,
    tripCode: document.getElementById('edit-tripCode').value.trim() || null,
    tripName: document.getElementById('edit-tripName').value.trim() || null,
    isCountry: true,
    continent: contSel !== 'all' ? contSel : 'Other',
    year: yrv2 ? parseInt(yrv2) : null,
    quarter: qrv2 ? parseInt(qrv2) : null
  };
  RAW_DATA.push(newItem);
  // Restore save button
  document.getElementById('dest-save-btn').onclick = saveEdit;
  document.getElementById('dest-delete-btn').style.display = '';
  saveData();
  closeModal();
}

// ---- BACKUP / RESTORE ----
function exportBackup() {
  const backup = {
    version: 2,
    exportDate: new Date().toISOString(),
    countDest: RAW_DATA.length,
    countTrips: TRIP_DATA.length,
    data: RAW_DATA,
    trips: TRIP_DATA
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `travels-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ גיבוי יוצא — ' + RAW_DATA.length + ' יעדים, ' + TRIP_DATA.length + ' נסיעות');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      let importedData, importedTrips;

      // Support raw array (v0), v1 (data only), v2 (data + trips)
      if (Array.isArray(parsed)) {
        importedData = parsed;
        importedTrips = null;
      } else if (parsed.data && Array.isArray(parsed.data)) {
        importedData = parsed.data;
        importedTrips = parsed.trips && Array.isArray(parsed.trips) ? parsed.trips : null;
      } else {
        throw new Error('פורמט לא מוכר');
      }

      // Validate
      if (!importedData.length || typeof importedData[0].name === 'undefined') {
        throw new Error('הקובץ אינו נראה כגיבוי תקין');
      }

      const exportDate = parsed.exportDate ? new Date(parsed.exportDate).toLocaleDateString('he-IL') : 'לא ידוע';
      const tripsMsg = importedTrips ? ` + ${importedTrips.length} נסיעות` : '';

      const doImport = () => {
        // Restore destinations
        RAW_DATA.length = 0;
        importedData.forEach(d => RAW_DATA.push(d));
        saveData();

        // Restore trips if available
        if (importedTrips) {
          TRIP_DATA.length = 0;
          importedTrips.forEach(t => TRIP_DATA.push(t));
          saveTrips();
        }

        event.target.value = '';
        showToast('✅ יובאו ' + RAW_DATA.length + ' יעדים' + (importedTrips ? ' + ' + TRIP_DATA.length + ' נסיעות' : ''));
        if (currentView === 'timeline') renderTimeline();
      };

      askConfirm('ייבוא גיבוי',
        'נמצאו ' + importedData.length + ' יעדים' + tripsMsg + '.<br>' +
        '<span style="font-size:0.78rem;color:var(--muted);">גיבוי מתאריך ' + exportDate + '<br>ייבוא יחליף את כל הנתונים הנוכחיים</span>',
        doImport);
      event.target.value = '';
      return;
    } catch(err) {
      askConfirm('שגיאה', 'שגיאה בייבוא הקובץ:<br>' + err.message, () => {});
      event.target.value = '';
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// Toast notification
function showToast(msg) {
  let t = document.getElementById('app-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'app-toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:0.85rem;color:var(--text);z-index:999;transition:opacity .3s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

const Q_LABELS = ['','Q1 ינואר–מרץ','Q2 אפריל–יוני','Q3 יולי–ספטמבר','Q4 אוקטובר–דצמבר'];
const Q_SHORT  = ['','Jan–Apr','Apr–Jun','Jul–Sep','Oct–Dec'];

let timelineFilter = 'upcoming';

function setTimelineFilter(f) {
  timelineFilter = f;
  ['upcoming','all','past'].forEach(x => {
    document.getElementById('tl-'+x)?.classList.toggle('active', x === f);
  });
  renderTimeline();
}

function renderTimeline() {
  const currentYear = new Date().getFullYear();
  let years = [...new Set(TRIP_DATA.map(t => t.year))].sort();

  if (timelineFilter === 'upcoming') years = years.filter(y => y >= currentYear);
  if (timelineFilter === 'past') years = years.filter(y => y < currentYear);

  // Add current and next 3 years if not present (for upcoming)
  if (timelineFilter !== 'past') {
    for (let y = currentYear; y <= currentYear + 3; y++) {
      if (!years.includes(y)) years.push(y);
    }
    years.sort();
  }

  const container = document.getElementById('timeline-container');
  if (!container) return;

  container.innerHTML = years.map(year => {
    const yearTrips = TRIP_DATA.filter(t => t.year === year);
    const hasBeen = yearTrips.some(t => t.been);
    const hasPlanned = yearTrips.some(t => t.planned);
    const age = yearTrips[0]?.age || '';

    // Quick chips for header
    const chips = yearTrips.map(t => {
      const cls = t.been ? 'been' : (t.planned ? 'planned' : '');
      return `<span class="year-chip ${cls}">${t.dest}</span>`;
    }).join('');

    const quartersHtml = [1,2,3,4].map(q => {
      const qTrips = yearTrips.filter(t => t.quarter === q);
      const hasTrip = qTrips.length > 0;
      const tripItems = qTrips.map((t, i) => {
        const idx = TRIP_DATA.indexOf(t);
        const cls = t.been ? 'been' : (t.planned ? 'planned' : '');
        return `<div class="trip-entry ${cls}" onclick="event.stopPropagation();openTripEdit(${idx})">${t.dest}</div>`;
      }).join('');
      return `<div class="quarter-cell ${hasTrip?'has-trip':''}" onclick="openTripAdd(${year},${q})">
        <div class="quarter-label">${Q_SHORT[q]}</div>
        ${tripItems}
        <button class="add-quarter-btn" onclick="event.stopPropagation();openTripAdd(${year},${q})" title="הוסף">+</button>
      </div>`;
    }).join('');

    return `<div class="year-block">
      <div class="year-header" onclick="toggleYear(this)">
        <span class="year-num">${year}</span>
        ${age ? `<span class="year-age">גיל ${age}</span>` : ''}
        <div class="year-chips">${chips || '<span style="color:var(--muted);font-size:0.75rem;">ללא נסיעות</span>'}</div>
        <span style="color:var(--muted);font-size:0.8rem;">▾</span>
      </div>
      <div class="quarters-grid">${quartersHtml}</div>
    </div>`;
  }).join('');
}

function toggleYear(header) {
  const grid = header.nextElementSibling;
  const isHidden = grid.style.display === 'none';
  grid.style.display = isHidden ? 'grid' : 'none';
  header.querySelector('span:last-child').textContent = isHidden ? '▾' : '▸';
}

let editTripIndex = -1;
let tripBeen = false;
let tripPlanned = false;
let tripQuarter = 0;

function openTripAdd(year, quarter) {
  editTripIndex = -1;
  tripBeen = false;
  tripPlanned = true;
  tripQuarter = quarter;
  document.getElementById('tripModalTitle').textContent = 'הוסף נסיעה';
  document.getElementById('trip-year').value = year;
  document.getElementById('trip-age').value = year - 1966;
  document.getElementById('trip-dest').value = '';
  document.getElementById('trip-notes').value = '';

  updateTripDestSuggestions();
  updateQuarterBtns();
  updateTripStatusBtns();
  document.getElementById('tripModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openTripEdit(idx) {
  editTripIndex = idx;
  const t = TRIP_DATA[idx];
  tripBeen = !!t.been;
  tripPlanned = !!t.planned;
  tripQuarter = t.quarter;
  document.getElementById('tripModalTitle').textContent = 'עריכת נסיעה';
  document.getElementById('trip-year').value = t.year;
  document.getElementById('trip-age').value = t.age || (t.year - 1966);
  document.getElementById('trip-dest').value = t.dest;
  document.getElementById('trip-notes').value = t.notes || '';
  document.getElementById('trip-delete-btn').style.display = '';
  updateTripDestSuggestions();
  updateQuarterBtns();
  updateTripStatusBtns();
  document.getElementById('tripModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openAddTrip() {
  const y = new Date().getFullYear();
  openTripAdd(y, 1);

}

function closeTripModal() {
  document.getElementById('tripModal').classList.remove('open');

}

}

function selectQuarter(q) {
  tripQuarter = q;
  updateQuarterBtns();
}
function updateQuarterBtns() {
  [1,2,3,4].forEach(q => {
    const btn = document.getElementById('tq-'+q);
    if (btn) btn.className = 'toggle-btn' + (tripQuarter === q ? ' on-been' : '');
  });
}

function toggleTripStatus(which) {
  if (which === 'been') { tripBeen = !tripBeen; if (tripBeen) tripPlanned = false; }
  if (which === 'planned') { tripPlanned = !tripPlanned; if (tripPlanned) tripBeen = false; }
  updateTripStatusBtns();
}
function updateTripStatusBtns() {
  const bb = document.getElementById('trip-btn-been');
  const bp = document.getElementById('trip-btn-planned');
  if (bb) bb.className = 'toggle-btn' + (tripBeen ? ' on-been' : '');
  if (bp) bp.className = 'toggle-btn' + (tripPlanned ? ' on-plan' : '');
}

// Build sorted list of planned destinations for dropdown
function getPlannedDestOptions() {
  const seen = new Set();
  const opts = [];
  RAW_DATA.forEach(d => {
    if (!d.planned) return;
    const cn = cleanName(d.name);
    if (!cn || seen.has(cn.toLowerCase())) return;
    seen.add(cn.toLowerCase());
    opts.push({ label: cn, sub: d.tripName || '', isCountry: !!d.isCountry });
  });
  opts.sort((a,b) => a.label.localeCompare(b.label));
  return opts;
}

let _destOpts = [];

function updateTripDestSuggestions() {
  _destOpts = getPlannedDestOptions();
}

function renderDestDropdown(opts) {
  const dd = document.getElementById('dest-dropdown');
  if (!dd) return;
  if (opts.length === 0) {
    dd.innerHTML = '<div style="padding:10px 14px;font-size:0.82rem;color:var(--muted);">אין תוצאות</div>';
    return;
  }
  dd.innerHTML = opts.map(o => `
    <div onclick="selectDestOption('${o.label.replace(/'/g, "\'")}')"
      style="padding:8px 14px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid var(--border);"
      onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
      <span style="font-weight:${o.isCountry ? '600' : '400'};color:var(--text);">${o.label}</span>
      ${o.sub ? `<span style="font-size:0.72rem;color:var(--muted);margin-right:6px;">— ${o.sub}</span>` : ''}
    </div>`).join('');
}

function filterDestDropdown(q) {
  const dd = document.getElementById('dest-dropdown');
  if (!dd) return;
  dd.style.display = 'block';
  const filtered = q.trim()
    ? _destOpts.filter(o => o.label.toLowerCase().includes(q.toLowerCase()) || o.sub.toLowerCase().includes(q.toLowerCase()))
    : _destOpts;
  renderDestDropdown(filtered);
}

function showDestDropdown() {
  updateTripDestSuggestions();
  const dd = document.getElementById('dest-dropdown');
  if (!dd) return;
  dd.style.display = 'block';
  const q = document.getElementById('trip-dest').value;
  filterDestDropdown(q);
}

function hideDestDropdown() {
  const dd = document.getElementById('dest-dropdown');
  if (dd) dd.style.display = 'none';
}

function selectDestOption(label) {
  const input = document.getElementById('trip-dest');
  if (input) input.value = label;
  hideDestDropdown();
}

function doSaveTripEdit(entry) {
  if (editTripIndex >= 0) {
    TRIP_DATA[editTripIndex] = entry;
  } else {
    TRIP_DATA.push(entry);
    TRIP_DATA.sort((a,b) => a.year !== b.year ? a.year - b.year : a.quarter - b.quarter);
  }
  saveTrips();

  // Sync year+quarter back to matching RAW_DATA entry
  const destLower = entry.dest.trim().toLowerCase();
  const match = RAW_DATA.find(d => cleanName(d.name).toLowerCase() === destLower);
  if (match) {
    match.year = entry.year;
    match.quarter = entry.quarter;
    match.planned = entry.planned;
    match.been = entry.been;
    saveData();
  }

  renderTimeline();
  closeTripModal();
  showToast('✅ נסיעה נשמרה');
}

const Q_NAMES = ['','ינואר–מרץ','אפריל–יוני','יולי–ספטמבר','אוקטובר–דצמבר'];

function saveTripEdit() {
  const year = parseInt(document.getElementById('trip-year').value);
  const age = parseInt(document.getElementById('trip-age').value) || (year - 1966);
  const dest = document.getElementById('trip-dest').value.trim();
  const notes = document.getElementById('trip-notes').value.trim();
  if (!dest || !year || !tripQuarter) { askConfirm('שגיאה', 'נא למלא שנה, רבעון ויעד', () => {}); return; }
  const entry = { year, quarter: tripQuarter, dest, been: tripBeen, planned: tripPlanned, notes, age };

  // Check if this dest already appears in TRIP_DATA at a different slot
  const destLower = dest.toLowerCase();
  const duplicates = TRIP_DATA.filter((t, i) => {
    if (i === editTripIndex) return false; // same record being edited
    return t.dest.toLowerCase() === destLower;
  });

  if (duplicates.length > 0) {
    const dupList = duplicates.map(t =>
      `${t.year} Q${t.quarter} (${Q_NAMES[t.quarter]})`
    ).join('<br>');
    askConfirm(
      '⚠️ יעד כפול',
      `<b>${dest}</b> כבר מתוכנן ב:<br><span style="color:var(--planned);font-size:0.85rem;">${dupList}</span><br><br>` +
      '<span style="font-size:0.82rem;color:var(--muted);">האם לשמור בכל זאת?</span>',
      () => doSaveTripEdit(entry)
    );
    // Change confirm button text to "שמור בכל זאת"
    const yesBtn = document.getElementById('confirmYes');
    if (yesBtn) yesBtn.textContent = 'שמור בכל זאת';
  } else {
    doSaveTripEdit(entry);
  }
}

function deleteTripEntry() {
  if (editTripIndex < 0) return;
  const t = TRIP_DATA[editTripIndex];
  askConfirm('מחיקת נסיעה', `האם למחוק את "${t.dest}"?<br><span style="font-size:0.8rem;color:var(--muted);">${t.year} Q${t.quarter}</span>`, () => {
    TRIP_DATA.splice(editTripIndex, 1);
    saveTrips();
    renderTimeline();
    closeTripModal();
  });
}

// Auto-calc age from year
document.addEventListener('DOMContentLoaded', () => {
  const yearEl = document.getElementById('trip-year');
  if (yearEl) yearEl.addEventListener('change', function() {
    const y = parseInt(this.value);
    if (y > 2000) document.getElementById('trip-age').value = y - 1966;
  });
});

renderStats();
render();
